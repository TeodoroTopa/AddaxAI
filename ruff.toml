target-version = "py38"
line-length = 120

[lint]
select = ["E", "F", "W"]  # basic errors, pyflakes, warnings
ignore = ["E501"]  # line length — not enforced yet

[lint.per-file-ignores]
"addaxai/ui/*" = ["E402", "E702"]  # late imports and semicolons OK in UI modules
"addaxai/ui/**/*" = ["E402", "E702"]
# app.py is a legacy monolith pre-dating linting. Suppressed codes:
#   E402        - imports must follow sys.path setup block
#   F403/F405   - wildcard tkinter import is original style; F405 is a consequence of F403
#   E701/E702   - single-line ifs and semicolons in plot helpers are original style
#   E711/E712   - `!= None` and `== True/False` comparisons are original style
#   E722        - bare except clauses are original style
#   E741        - ambiguous variable names (l) are original style
#   F841        - unused variable assignments are original style
# These will shrink as modules continue to be extracted from this file.
"addaxai/app.py" = ["E402", "F403", "F405", "E701", "E702", "E711", "E712", "E722", "E741", "F841"]
