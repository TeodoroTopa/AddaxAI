name: Bug Report
description: Report a bug in AddaxAI
labels: ["bug"]
body:
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Windows 11, macOS 14.2"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.8.19 (env-base)"
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model Used
      placeholder: "e.g. MegaDetector v5a, DeepFaune v1.4"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include error messages if any.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead.
